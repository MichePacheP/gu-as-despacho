server.port=8080
spring.application.name=guias-despacho

aws.region=us-east-1
aws.s3.bucket-name=${S3_BUCKET_NAME:guias-de-despacho-bucket}
aws.access-key=${AWS_ACCESS_KEY_ID:}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:}

efs.mount-path=${EFS_MOUNT_PATH:/mnt/efs/guias}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.com.transportista=DEBUG
logging.level.software.amazon.awssdk=WARN